<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — AgriSystem AI</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="config.js"></script>
    <style>
      .login-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: var(--bg-sidebar);
      }

      .login-card {
        background: var(--bg-main);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-lg);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        padding: 40px 36px;
        width: 100%;
        max-width: 440px;
      }

      .login-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 8px 0;
        color: var(--text-primary);
      }

      .login-subtitle {
        font-size: 0.875rem;
        color: var(--text-secondary);
        margin: 0 0 28px 0;
        line-height: 1.4;
      }

      .login-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 20px;
      }

      .login-field label {
        font-weight: 500;
        font-size: 0.813rem;
        color: var(--text-secondary);
      }

      .login-select {
        padding: 10px 12px;
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        font-size: 0.938rem;
        background: white;
        color: var(--text-primary);
        cursor: pointer;
      }

      .login-select:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        background: var(--accent, #2563eb);
        color: white;
        border: none;
        border-radius: var(--border-radius);
        font-size: 0.938rem;
        font-weight: 500;
        cursor: pointer;
        margin-top: 12px;
      }

      .login-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .login-error {
        color: #dc2626;
        font-size: 0.813rem;
        margin-top: 12px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <h1 class="login-title">AgriSystem AI</h1>
        <p class="login-subtitle">
          Selecione a entidade e o ano agricola para continuar.
        </p>

        <div class="login-field">
          <label for="entidade-select">Entidade</label>
          <select id="entidade-select" class="login-select" disabled>
            <option value="">A carregar...</option>
          </select>
        </div>

        <div class="login-field">
          <label for="ano-select">Ano Agricola</label>
          <select id="ano-select" class="login-select" disabled>
            <option value="">Selecione a entidade primeiro</option>
          </select>
        </div>

        <button class="login-btn" id="login-btn" disabled>Entrar</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>

    <script>
      const select = document.getElementById("entidade-select");
      const anoSelect = document.getElementById("ano-select");
      const loginBtn = document.getElementById("login-btn");
      const errorEl = document.getElementById("login-error");
      const API_BASE_URL = typeof API_BASE !== "undefined" ? API_BASE : "http://127.0.0.1:8000";

      if (sessionStorage.getItem("entidade_id")) {
        window.location.href = "index.html";
      }

      fetch(`${API_BASE_URL}/api/entidades`)
        .then((r) => r.json())
        .then((data) => {
          select.innerHTML = '<option value="">Selecione...</option>';
          data.entidades.forEach((e) => {
            const opt = document.createElement("option");
            opt.value = e.id;
            opt.textContent = `Entidade ${e.id} (${e.num_propriedades} propriedades)`;
            select.appendChild(opt);
          });
          select.disabled = false;
        })
        .catch(() => {
          select.innerHTML =
            '<option value="">Erro ao carregar entidades</option>';
          errorEl.textContent =
            "Nao foi possivel contactar o servidor. Verifique se a API esta a correr.";
          errorEl.style.display = "block";
        });

      select.addEventListener("change", () => {
        anoSelect.innerHTML = '<option value="">A carregar...</option>';
        anoSelect.disabled = true;
        loginBtn.disabled = true;
        if (!select.value) {
          anoSelect.innerHTML = '<option value="">Selecione a entidade primeiro</option>';
          return;
        }
        fetch(`${API_BASE_URL}/api/anos-agricolas?entidade_id=${select.value}`)
          .then((r) => r.json())
          .then((data) => {
            if (data.anos.length === 0) {
              anoSelect.innerHTML = '<option value="">Sem ano agricola</option>';
              anoSelect.disabled = true;
              loginBtn.disabled = false;
              return;
            }
            anoSelect.innerHTML = '<option value="">Selecione...</option>';
            data.anos.forEach((a) => {
              const opt = document.createElement("option");
              opt.value = a.id;
              opt.textContent = a.denominacao;
              if (a.corrente) opt.textContent += " (atual)";
              anoSelect.appendChild(opt);
            });
            anoSelect.disabled = false;
            const corrente = data.anos.find((a) => a.corrente);
            if (corrente) {
              anoSelect.value = corrente.id;
            } else {
              anoSelect.value = data.anos[0].id;
            }
            loginBtn.disabled = false;
          })
          .catch(() => {
            anoSelect.innerHTML = '<option value="">Erro ao carregar anos</option>';
          });
      });

      anoSelect.addEventListener("change", () => {
        loginBtn.disabled = !select.value;
      });

      loginBtn.addEventListener("click", () => {
        if (!select.value) return;
        sessionStorage.setItem("entidade_id", select.value);
        sessionStorage.setItem("ano_agricola_id", anoSelect.value || "");
        const selectedOpt = anoSelect.options[anoSelect.selectedIndex];
        sessionStorage.setItem("ano_agricola_label", selectedOpt ? selectedOpt.textContent : "");
        window.location.href = "index.html";
      });
    </script>
  </body>
</html>
