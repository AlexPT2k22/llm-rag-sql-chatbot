<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgriSystem AI</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="config.js"></script>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo-area">
            <span class="logo-text">AgriSystem AI</span>
          </div>
          <button class="sidebar-collapse" aria-label="Recolher menu">
            <i class="ph ph-sidebar-simple"></i>
          </button>
        </div>

        <div class="nav-section">
          <div class="nav-title-row">
            <h3 class="nav-title">Recent Chats</h3>
            <div class="nav-actions">
              <button aria-label="New chat" id="new-chat-btn">
                <i class="ph ph-plus"></i>
              </button>
            </div>
          </div>
          <div id="chat-history-list">
            <a href="#" class="nav-item active">
              <span>New Session</span>
            </a>
          </div>
        </div>

        <div class="sidebar-footer">
          <div class="entidade-info" id="entidade-info"></div>
          <a class="admin-btn" href="admin.html" aria-label="Admin Panel">
            <i class="ph ph-gear"></i>
            <span>Admin Panel</span>
          </a>
          <button class="admin-btn" id="logout-btn" aria-label="Log Out">
            <i class="ph ph-sign-out"></i>
            <span>Log Out</span>
          </button>
        </div>
      </aside>

      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <main class="main-content">
        <div class="topbar">
          <button class="topbar__menu" id="menu-btn" aria-label="Abrir menu">
            <i class="ph ph-list"></i>
          </button>
          <div class="topbar__spacer"></div>
          <div class="topbar__badge">
            <span class="topbar__dot"></span>
            Running locally on Ollama with Qwen2.5 7B
          </div>
        </div>

        <div class="chat-container" id="chat-container">
          <div class="welcome-container" id="welcome-message">
            <h1>How can I help?</h1>
            <p>
              Ask questions about module data or about procedures and
              functional documentation.
            </p>
          </div>
        </div>

        <div class="input-container-wrapper">
          <div class="input-box">
            <div class="input-row">
              <textarea
                id="user-input"
                placeholder="Faça uma pergunta ao AgriSystem AI..."
                rows="1"
              ></textarea>
              <button
                id="send-btn"
                class="send-btn"
                aria-label="Enviar"
                title="Enviar mensagem"
                disabled
              >
                <i class="ph ph-arrow-up"></i>
              </button>
            </div>

            <div class="input-footer">
              Content generated by AI may contain inaccuracies. Please verify any
              important information.
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
